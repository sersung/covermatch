version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: covermatch
      POSTGRES_USER: covermatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # apenas local — não expor para internet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covermatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://covermatch:${POSTGRES_PASSWORD}@postgres:5432/covermatch
      PORT: 3002
    ports:
      - "127.0.0.1:3002:3002"   # Nginx fará o proxy reverso
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
